name: pol_lapor
description: "Sistem Pelaporan Kerusakan Fasilitas Kampus Polban."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local Storage (Offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # API & Network
  dio: ^5.4.3+1
  connectivity_plus: ^7.1.1

  # Fitur Laporan & Kamera
  image_picker: ^1.1.2 
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  
  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.3
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env